name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: judgemycal-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: judgemycal-agent/requirements*.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  android:
    name: Android (build, unit tests, lint, release bundle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build, unit tests, lint
        run: ./gradlew --no-daemon build
      - name: Release bundle (R8 + shrinking; debug-key signed on CI)
        run: ./gradlew --no-daemon bundleRelease assembleRelease
      - name: Verify no secrets in the release binary
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "Scanning $APK (decompiled scan, not source scan)"
          mkdir -p /tmp/apk-scan && unzip -o -q "$APK" -d /tmp/apk-scan
          # Google API keys are 'AIza' + 35 url-safe chars. The committed
          # placeholder google-services.json is explicitly allowed; anything
          # else key-shaped in the compiled binary fails the build.
          HITS=$(grep -rEsoa 'AIza[0-9A-Za-z_-]{35}' /tmp/apk-scan | grep -v 'AIzaSyA-PLACEHOLDER' || true)
          if [ -n "$HITS" ]; then
            echo "::error::Key-like strings found in the release APK:"; echo "$HITS"; exit 1
          fi
          if grep -rqsa 'GOOGLE_API_KEY' /tmp/apk-scan; then
            echo "::error::GOOGLE_API_KEY reference found in the release APK"; exit 1
          fi
          echo "Clean: no key-like strings in the release binary."
      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

  android-instrumented:
    name: Android (instrumented: capture flow + safety floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          working-directory: android
          script: ./gradlew --no-daemon connectedDebugAndroidTest
      - name: Upload instrumented test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports
          path: android/app/build/reports/androidTests/
